server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/starmap;
    index index.html;

    location /static/js/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
    location /static/fonts/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
    location /static/data/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Worldbuilding API — proxied to Flask on localhost:5000
    location /api/world/ {
        proxy_pass         http://127.0.0.1:5000/api/world/;
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
        add_header         Cache-Control "no-store";
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_unavailable;
    }
    location @api_unavailable {
        return 200 '[]';
        add_header Content-Type "application/json";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/html text/css application/javascript text/csv text/plain;
    gzip_min_length 1000;

    access_log /var/log/nginx/starmap_access.log;
    error_log  /var/log/nginx/starmap_error.log;
}
