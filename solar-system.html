<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/images/Galactic.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System — Inner View</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0ede6; --ink:#0d1a2e; --ac:#0066cc;
  --pn:rgba(245,243,240,0.72); --ptx:#1a1a1a; --pdm:#6a6a6a;
  --fs:clamp(11px,1vw,16px);
  --fs-sm:calc(var(--fs)*.78); --fs-md:var(--fs);
  --fs-lg:calc(var(--fs)*1.25); --fs-xl:calc(var(--fs)*1.6);
  --pw:clamp(160px,16vw,260px);
}
body{background:var(--bg);color:var(--ink);font-family:'Space Mono',monospace;overflow:hidden;width:100vw;height:100vh}
canvas{display:block;position:absolute;inset:0;width:100%!important;height:100%!important}
#wrap{position:fixed;inset:0;background:var(--bg)}

#hdr{position:fixed;top:0;left:0;right:0;padding:clamp(6px,.8vh,12px) 18px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(240,237,230,.97),transparent);z-index:10;pointer-events:none}
#hdr h1{font-family:'Orbitron',sans-serif;font-size:var(--fs-xl);font-weight:900;letter-spacing:.13em;color:var(--ink);opacity:.85}
#hdr p{font-size:var(--fs-sm);color:#8899aa;letter-spacing:.06em;margin-top:2px}
#back-btn{pointer-events:all;font-family:'Space Mono',monospace;font-size:var(--fs-sm);background:rgba(245,243,240,0.80);color:#1a1a1a;border:1.5px solid rgba(0,0,0,0.12);border-radius:10px;box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 2px 8px rgba(0,0,0,.08);padding:6px 16px;cursor:pointer;transition:background .15s,box-shadow .15s}
#back-btn:hover{background:rgba(245,243,240,0.96);box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 3px 12px rgba(0,0,0,.13)}

.pn{position:fixed;background:rgba(245,243,240,0.72);backdrop-filter:blur(28px) saturate(1.6);-webkit-backdrop-filter:blur(28px) saturate(1.6);border:none;border-radius:18px;padding:clamp(10px,1.2vh,16px) clamp(10px,1vw,16px);z-index:10;box-shadow:0 1px 0 rgba(255,255,255,0.90) inset,0 -1px 0 rgba(0,0,0,0.06) inset,1px 0 0 rgba(255,255,255,0.60) inset,-1px 0 0 rgba(255,255,255,0.30) inset,0 12px 48px rgba(0,0,0,0.10),0 2px 8px rgba(0,0,0,0.06)}
.pn h4{font-family:'Orbitron',sans-serif;font-size:var(--fs-sm);letter-spacing:.14em;color:var(--pdm);margin-bottom:8px;text-transform:uppercase}

/* time controls */
#tc{bottom:18px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;padding:8px 16px;white-space:nowrap}
#tc button{font-family:'Space Mono',monospace;font-size:var(--fs-md);background:rgba(0,102,204,.4);
  color:var(--ptx);border:none;border-radius:12px;box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 8px 24px rgba(0,0,0,.10);
  padding:4px 12px;cursor:pointer;transition:background .15s}
#tc button:hover{background:rgba(0,102,204,.7)}
#tc button.active{background:rgba(0,102,204,.7);border-color:rgba(100,150,255,.6)}
#tc label{font-size:var(--fs-sm);color:var(--pdm)}
#speed-sl{width:clamp(80px,8vw,130px);height:2px;-webkit-appearance:none;background:rgba(100,150,255,.2);outline:none;border-radius:2px;cursor:pointer}
#speed-sl::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#0088ff;cursor:pointer}
#tc span{font-size:var(--fs-sm);color:#88bbff;min-width:80px}

/* detail panel */
#dp{top:clamp(70px,7vh,100px);right:18px;width:var(--pw);display:none}
#dp h4{color:#1a1a1a;font-size:var(--fs-md);margin-bottom:8px;padding-right:16px}
.dr{font-size:var(--fs-md);margin-bottom:4px;color:var(--ptx)}
.dr .lb{color:#6a6a6a}
#cs{position:absolute;top:7px;right:9px;font-size:var(--fs-lg);color:#6a6a6a;cursor:pointer;background:none;border:none}
#cs:hover{color:#1a1a1a}
/* #dwiki styled via .dp-btn.dp-btn-wiki */

/* nav help */
#np{bottom:18px;right:18px;width:var(--pw)}
.cr{font-size:var(--fs-md);color:var(--ptx);margin-bottom:4px}
.cr b{color:#88bbff;font-weight:normal}

/* tooltip */
#tp{position:fixed;pointer-events:none;z-index:30;display:none;background:var(--pn);border:none;border-radius:12px;box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 8px 24px rgba(0,0,0,.10);padding:7px 11px;max-width:220px;backdrop-filter:blur(8px)}
#tp h3{font-family:'Orbitron',sans-serif;font-size:var(--fs-lg);color:#88bbff;margin-bottom:3px}
#tp p{font-size:var(--fs-md);color:var(--ptx);line-height:1.6}
#tp p b{color:#ffaa66;font-weight:normal}

#ds{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-size:var(--fs-sm);color:#8899aa;pointer-events:none;z-index:10;letter-spacing:.05em}
</style>
<link rel="stylesheet" href="/static/css/worldbuilding.css">
</head>
<body>
<div id="wrap"></div>
<div id="hdr">
  <div>
    <h1>☀ SOLAR SYSTEM</h1>
    <p>HELIOCENTRIC · 1 UNIT = 1 AU · J2000 ECLIPTIC PLANE</p>
  </div>
  <button id="back-btn" onclick="window.close()">✕ Close</button>
</div>

<div class="pn" id="dp">
  <button id="cs">✕</button>
  <h4 id="dn">—</h4>
  <div class="dr"><span class="lb">Type       </span><span id="dtype"></span></div>
  <div class="dr"><span class="lb">Distance   </span><span id="ddist"></span></div>
  <div class="dr"><span class="lb">Diameter   </span><span id="ddiam"></span></div>
  <div class="dr"><span class="lb">Mass       </span><span id="dmass"></span></div>
  <div class="dr"><span class="lb">Day length </span><span id="dday"></span></div>
  <div class="dr"><span class="lb">Year length</span><span id="dyear"></span></div>
  <div class="dr"><span class="lb">Moons      </span><span id="dmoons"></span></div>
  <div class="dr" id="dr-wiki" style="display:none">
    <a id="dwiki" href="#" target="_blank" rel="noopener" class="dp-btn dp-btn-wiki">⬡ Wikipedia</a>
  </div>
  <div id="dr-moons" style="display:none;margin-top:4px">
    <button id="btn-moons" class="dp-btn dp-btn-moons">⬡ Moons</button>
  </div>
</div>

<div class="pn" id="tc">
  <button id="btn-play" class="active" title="Play/Pause">⏸</button>
  <button id="btn-reset" title="Reset to today">↺</button>
  <label>Speed</label>
  <input type="range" id="speed-sl" min="-2" max="3" step="0.1" value="1">
  <span id="speed-lbl">×10 days/s</span>
  <label style="margin-left:8px">Date</label>
  <input type="date" id="date-pick"
    style="font-family:'Space Mono',monospace;font-size:var(--fs-sm);
           background:rgba(245,243,240,0.85);color:#1a1a1a;
           border:1px solid rgba(0,0,0,.12);border-radius:8px;
           padding:2px 6px;cursor:pointer;outline:none;
           color-scheme:light;min-width:130px">
</div>

<div class="pn" id="np">
  <h4>Navigation</h4>
  <div class="cr"><b>Drag</b> — Orbit view</div>
  <div class="cr"><b>Right-drag</b> — Pan</div>
  <div class="cr"><b>Scroll</b> — Zoom</div>
  <div class="cr"><b>Click</b> — Body info</div>
</div>

<div id="tp"><h3 id="tn"></h3><p id="tb"></p></div>
<div id="ds">SOLAR SYSTEM · NASA JPL ORBITAL ELEMENTS · REAL-TIME SIMULATION</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
const $=id=>document.getElementById(id);

// ── PLANET DATA ──────────────────────────────────────────────────────────────
// [name, a_AU, e, i_deg, color_hex, radius_km, mass_kg_exp24, day_hours, year_days, moons, type, mean_lon_deg]
const PLANETS=[
  {name:'Mercury',  a:0.387, e:0.206, inc:7.0,   color:'#888888', r:2439.7,  mass:'0.33×10²⁴',  day:'1407.6h', year:'87.97d',   moons:0,    type:'Rocky Planet',  L0:252.25},
  {name:'Venus',    a:0.723, e:0.007, inc:3.4,   color:'#e8c030', r:6051.8,  mass:'4.87×10²⁴',  day:'5832.5h', year:'224.7d',   moons:0,    type:'Rocky Planet',  L0:181.98},
  {name:'Earth',    a:1.000, e:0.017, inc:0.0,   color:'#2266aa', r:6371.0,  mass:'5.97×10²⁴',  day:'23.9h',   year:'365.25d',  moons:1,    type:'Rocky Planet',  L0:100.46},
  {name:'Mars',     a:1.524, e:0.093, inc:1.8,   color:'#cc4422', r:3389.5,  mass:'0.64×10²⁴',  day:'24.6h',   year:'686.97d',  moons:2,    type:'Rocky Planet',  L0:355.45},
  {name:'Jupiter',  a:5.203, e:0.049, inc:1.3,   color:'#c8924a', r:69911.0, mass:'1898×10²⁴',  day:'9.9h',    year:'4332.6d',  moons:95,   type:'Gas Giant',      L0:34.40},
  {name:'Saturn',   a:9.537, e:0.057, inc:2.5,   color:'#d4bc60', r:58232.0, mass:'568×10²⁴',   day:'10.7h',   year:'10759.2d', moons:146,  type:'Gas Giant',      L0:49.94},
  {name:'Uranus',   a:19.19, e:0.046, inc:0.8,   color:'#66aabb', r:25362.0, mass:'86.8×10²⁴',  day:'17.2h',   year:'30685.4d', moons:28,   type:'Ice Giant',      L0:313.23},
  {name:'Neptune',  a:30.07, e:0.010, inc:1.8,   color:'#2244aa', r:24622.0, mass:'102×10²⁴',   day:'16.1h',   year:'60190.0d', moons:16,   type:'Ice Giant',      L0:304.88},
];

// Major moons [name, parent_index, a_parent_radii, period_days, color, r_km]
const MOONS=[
  {name:'Moon',     pi:2,  a:60.27, period:27.32,  color:'#aaaaaa', r:1737},
  {name:'Io',       pi:4,  a:5.90,  period:1.769,  color:'#d4a030', r:1821},
  {name:'Europa',   pi:4,  a:9.40,  period:3.551,  color:'#c8b090', r:1560},
  {name:'Ganymede', pi:4,  a:15.0,  period:7.155,  color:'#998877', r:2634},
  {name:'Callisto', pi:4,  a:26.3,  period:16.69,  color:'#887766', r:2410},
  {name:'Titan',    pi:5,  a:20.3,  period:15.95,  color:'#cc9940', r:2574},
  {name:'Triton',   pi:7,  a:14.3,  period:5.877,  color:'#99aacc', r:1353},
];

// Visual radii (scene units, 1=1AU) — log-scaled with boost for inner planets
function visRadius(r_km, type){
  const base=Math.log10(r_km/6371+1)*0.38+0.035;
  return type==='Rocky Planet'?Math.max(base,0.045):base;
}

// ── SCENE ────────────────────────────────────────────────────────────────────
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.001,500);
camera.position.set(0,8,20);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0xf0ede6,1);
scene.background=new THREE.Color(0xf0ede6);
$('wrap').appendChild(renderer.domElement);
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

// ── ORBIT CONTROLS ───────────────────────────────────────────────────────────
const cam={
  sph:new THREE.Spherical(22,1.1,.5),
  target:new THREE.Vector3(),pan:new THREE.Vector3(),
  drag:false,right:false,last:{x:0,y:0},
  update(){
    this.sph.phi=Math.max(.05,Math.min(Math.PI-.05,this.sph.phi));
    this.sph.radius=Math.max(.5,Math.min(120,this.sph.radius));
    camera.position.setFromSpherical(this.sph).add(this.target).add(this.pan);
    camera.lookAt(new THREE.Vector3().addVectors(this.target,this.pan));
  }
};
const cvs=renderer.domElement;
cvs.addEventListener('contextmenu',e=>e.preventDefault());
cvs.addEventListener('mousedown',e=>{cam.drag=true;cam.right=e.button===2;cam.last={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',()=>cam.drag=false);
window.addEventListener('mousemove',e=>{
  if(!cam.drag)return;
  const dx=e.clientX-cam.last.x,dy=e.clientY-cam.last.y;
  if(cam.right){const sp=cam.sph.radius*.0015,r=new THREE.Vector3(),u=new THREE.Vector3(0,1,0);r.crossVectors(camera.getWorldDirection(new THREE.Vector3()),u).normalize();cam.pan.addScaledVector(r,-dx*sp).addScaledVector(u,dy*sp);}
  else{cam.sph.theta-=dx*.005;cam.sph.phi-=dy*.005;}
  cam.last={x:e.clientX,y:e.clientY};
});
cvs.addEventListener('wheel',e=>{e.preventDefault();cam.sph.radius*=1+e.deltaY*.001;},{passive:false});

// ── BACKGROUND STAR HAZE ─────────────────────────────────────────────────────
(()=>{
  const n=3000,p=new Float32Array(n*3);
  for(let i=0;i<n;i++){const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=200+Math.random()*100;p[i*3]=r*Math.sin(ph)*Math.cos(th);p[i*3+1]=r*Math.sin(ph)*Math.sin(th)*.15;p[i*3+2]=r*Math.cos(ph);}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(p,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:.8,color:0x8899bb,transparent:true,opacity:.2,depthWrite:false})));
})();

// ── ECLIPTIC GRID ────────────────────────────────────────────────────────────
(()=>{
  const mat=new THREE.LineBasicMaterial({color:0xb8b4ac,transparent:true,opacity:.3});
  // Orbit rings at 1,5,10,20,30 AU
  [1,5,10,20,30].forEach(r=>{
    const pts=[];for(let i=0;i<=128;i++){const a=i/128*Math.PI*2;pts.push(new THREE.Vector3(Math.cos(a)*r,0,Math.sin(a)*r));}
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),mat));
  });
  // Thin ecliptic disc
  const disc=new THREE.Mesh(new THREE.CircleGeometry(31,64),new THREE.MeshBasicMaterial({color:0xc8c4bc,transparent:true,opacity:.06,side:THREE.DoubleSide,depthWrite:false}));
  disc.rotation.x=Math.PI/2;scene.add(disc);
})();

// ── SUN ──────────────────────────────────────────────────────────────────────
const sunGeo=new THREE.SphereGeometry(0.12,32,32);
const sunMat=new THREE.MeshBasicMaterial({color:0xdd8800});
const sunMesh=new THREE.Mesh(sunGeo,sunMat);
scene.add(sunMesh);
// Sun point light for atmosphere
const sunLight=new THREE.PointLight(0xffeedd,1.2,50);scene.add(sunLight);
// Ambient light so outer planets are visible
const ambLight=new THREE.AmbientLight(0xf0ede6,0.35);scene.add(ambLight);
// (sunLbl created after makeLabel is defined below)

// ── LABEL SYSTEM (constant screen size) ──────────────────────────────────────
const LABEL_PX_H=16, LABEL_SCALE=3, HALO_COLOR='rgba(240,237,230,0.92)', HALO_W=5;
function makeLabel(txt,hexCol){
  const canvH=LABEL_PX_H*LABEL_SCALE;
  const c=document.createElement('canvas'),ctx=c.getContext('2d');
  const fontSize=Math.round(canvH*.78);
  ctx.font=`700 ${fontSize}px "Space Mono",monospace`;
  const textW=Math.ceil(ctx.measureText(txt).width)+HALO_W*2+10;
  c.width=textW;c.height=canvH;
  ctx.font=`700 ${fontSize}px "Space Mono",monospace`;
  ctx.lineWidth=HALO_W*2;ctx.lineJoin='round';ctx.strokeStyle=HALO_COLOR;ctx.strokeText(txt,HALO_W+5,fontSize);
  const ri=parseInt(hexCol.slice(1,3),16)/255,gi=parseInt(hexCol.slice(3,5),16)/255,bi=parseInt(hexCol.slice(5,7),16)/255;
  ctx.fillStyle=`rgb(${Math.round(ri*.3*255)},${Math.round(gi*.3*255)},${Math.round(Math.min(bi*.3+.1,1)*255)})`;
  ctx.fillText(txt,HALO_W+5,fontSize);
  const tex=new THREE.CanvasTexture(c);tex.minFilter=tex.magFilter=THREE.LinearFilter;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,opacity:.92,depthWrite:false,depthTest:false,blending:THREE.NormalBlending}));
  sp.renderOrder=999;
  sp.userData.aspect=textW/canvH;sp.scale.set(1,1,1);return sp;
}

// Sun label — created after makeLabel is defined
const sunLbl=makeLabel('Sun','#cc7700');sunLbl.position.set(0,0,0);scene.add(sunLbl);

// ── ORBIT PATH GEOMETRY ───────────────────────────────────────────────────────
function makeOrbitLine(a,e,inc_deg,color){
  const inc=inc_deg*Math.PI/180;
  const pts=[];
  for(let i=0;i<=256;i++){
    const f=i/256*Math.PI*2;
    // r = a(1-e²)/(1+e·cos(f))
    const r=a*(1-e*e)/(1+e*Math.cos(f));
    const x=r*Math.cos(f),z=r*Math.sin(f);
    // Apply inclination (rotation around X axis)
    pts.push(new THREE.Vector3(x, z*Math.sin(inc), z*Math.cos(inc)));
  }
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineBasicMaterial({color:parseInt(color.slice(1),16),transparent:true,opacity:.22});
  return new THREE.Line(geo,mat);
}

// ── SOLAR SURFACE TEXTURES ────────────────────────────────────────────────────
// Auto-loaded from /static/data/maps/sol/ — run update-solar-textures.sh to fetch
const SOL_TEX_DIR = '/static/data/maps/sol/';
const SOL_PLANET_MAP = {
  'Mercury':'mercury.jpg','Venus':'venus.jpg','Earth':'earth.jpg',
  'Mars':'mars.jpg','Jupiter':'jupiter.jpg','Saturn':'saturn.jpg',
  'Uranus':'uranus.jpg','Neptune':'neptune.jpg'
};
const SOL_MOON_MAP = {
  'Moon':'moon.jpg'
};

function applyTexToMesh(mesh, url){
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{
    const oc=document.createElement('canvas');
    oc.width=img.naturalWidth; oc.height=img.naturalHeight;
    oc.getContext('2d').drawImage(img,0,0);
    const tex=new THREE.CanvasTexture(oc);
    tex.wrapS=THREE.RepeatWrapping;
    tex.needsUpdate=true;
    mesh.material=new THREE.MeshBasicMaterial({map:tex});
    mesh.material.needsUpdate=true;
  };
  img.onerror=()=>{};
  img.src=url;
}

function loadSolTextures(){
  // Sun texture
  applyTexToMesh(sunMesh, SOL_TEX_DIR+'sun.jpg');
  // Planets and moons
  planetObjects.forEach(po=>{
    const fname=SOL_PLANET_MAP[po.data.name];
    if(fname) applyTexToMesh(po.mesh, SOL_TEX_DIR+fname);
    po.moons.forEach(mo=>{
      const mfname=SOL_MOON_MAP[mo.data.name];
      if(mfname) applyTexToMesh(mo.mesh, SOL_TEX_DIR+mfname);
    });
  });
}

// ── PLANET BODY (dark sphere, no glow per request) ────────────────────────────
function makePlanetMesh(r,color){
  const geo=new THREE.SphereGeometry(r,24,16);
  // Dark base with slight colour tint — same style as star cores in galactic map
  const c=new THREE.Color(color);
  const dark=new THREE.Color(c.r*.25,c.g*.25,c.b*.25+.05);
  const mat=new THREE.MeshPhongMaterial({color:dark,emissive:dark.clone().multiplyScalar(.3),specular:new THREE.Color(.1,.1,.15),shininess:20});
  return new THREE.Mesh(geo,mat);
}

// ── SATURN RINGS ─────────────────────────────────────────────────────────────
function makeSaturnRings(innerR, outerR){
  const geo=new THREE.RingGeometry(innerR,outerR,64);
  // RingGeometry UVs need fixing for proper texture — just use flat color
  const mat=new THREE.MeshBasicMaterial({color:0xc8a840,transparent:true,opacity:.35,side:THREE.DoubleSide,depthWrite:false});
  const ring=new THREE.Mesh(geo,mat);
  ring.rotation.x=Math.PI/2;
  // Slight tilt (27°)
  ring.rotation.z=27*Math.PI/180;
  return ring;
}

// ── ASTEROID BELT ─────────────────────────────────────────────────────────────
(()=>{
  const n=1800, pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const a=2.2+Math.random()*1.3; // 2.2–3.5 AU
    const angle=Math.random()*Math.PI*2;
    const spread=(Math.random()-.5)*.25;
    pos[i*3]=Math.cos(angle)*a;
    pos[i*3+1]=spread;
    pos[i*3+2]=Math.sin(angle)*a;
  }
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:.015,color:0x887766,transparent:true,opacity:.5,depthWrite:false})));
})();

// ── BUILD PLANETS ─────────────────────────────────────────────────────────────
const planetObjects=[]; // {data, mesh, label, orbitLine, visR, moonScale, moons:[]}

PLANETS.forEach((pd,i)=>{
  const r=visRadius(pd.r,pd.type);
  const mesh=makePlanetMesh(r,pd.color);
  scene.add(mesh);

  const orbitLine=makeOrbitLine(pd.a,pd.e,pd.inc,pd.color);
  scene.add(orbitLine);

  const lbl=makeLabel(pd.name,'#'+new THREE.Color(pd.color).getHexString());
  scene.add(lbl);

  // Saturn rings
  let rings=null;
  if(pd.name==='Saturn'){
    rings=makeSaturnRings(r*1.25,r*2.3);
    mesh.add(rings);
  }

  // Per-planet moon scale: innermost moon orbits at INNER_MOON_FACTOR × planet visual radius
  // This ensures moons are always clearly outside the planet sphere regardless of zoom.
  const INNER_MOON_FACTOR = 2.4;
  const myMoons = MOONS.filter(m=>m.pi===i);
  const innerA  = myMoons.length ? Math.min(...myMoons.map(m=>m.a)) : 1;
  const moonScale = myMoons.length ? (INNER_MOON_FACTOR * r) / innerA : 1;

  // Moon minimum visual radius: 18% of parent's visual radius
  const MIN_MOON_R = r * 0.18;

  // Moons
  const moonObjs=[];
  myMoons.forEach(md=>{
    const mr=Math.max(visRadius(md.r,'Rocky Planet')*0.55, MIN_MOON_R);
    const mmesh=new THREE.Mesh(
      new THREE.SphereGeometry(mr,14,10),
      new THREE.MeshPhongMaterial({
        color:new THREE.Color(md.color).multiplyScalar(.25),
        emissive:new THREE.Color(md.color).multiplyScalar(.08)
      })
    );
    scene.add(mmesh);
    const mlbl=makeLabel(md.name,'#'+new THREE.Color(md.color).getHexString());
    scene.add(mlbl);
    moonObjs.push({data:md, mesh:mmesh, label:mlbl, r:mr});
  });

  planetObjects.push({data:pd, mesh, label:lbl, orbitLine, rings, visR:r, moonScale, moons:moonObjs});
});

// ── TIME SIMULATION ──────────────────────────────────────────────────────────
// J2000.0 epoch = Jan 1.5 2000 TT  →  946728000000 ms Unix time
const J2000_MS = 946728000000;

function dateToSimDays(dateStr){
  // dateStr = 'YYYY-MM-DD'
  return (new Date(dateStr+'T12:00:00Z').getTime() - J2000_MS) / 86400000;
}
function simDaysToDateStr(days){
  return new Date(J2000_MS + days*86400000).toISOString().slice(0,10);
}

// Start at today
let simDays = dateToSimDays(new Date().toISOString().slice(0,10));
let playing = true;
let speedExp = 1;
let userPickingDate = false; // prevent feedback loop

// Initialise the date picker to today
const datePick = $('date-pick');
datePick.value = simDaysToDateStr(simDays);
datePick.min = '1600-01-01';
datePick.max = '2200-12-31';

// When user picks a date: jump to it and pause
datePick.addEventListener('change', e => {
  if(!e.target.value) return;
  simDays = dateToSimDays(e.target.value);
  // Pause so they can inspect the chosen date
  playing = false;
  $('btn-play').textContent = '▶';
  $('btn-play').classList.remove('active');
});

// Prevent the animation loop from clobbering the input while user is typing
datePick.addEventListener('focus', () => { userPickingDate = true;  });
datePick.addEventListener('blur',  () => { userPickingDate = false; });

$('btn-play').addEventListener('click', () => {
  playing = !playing;
  $('btn-play').textContent = playing ? '⏸' : '▶';
  $('btn-play').classList.toggle('active', playing);
});

// Reset jumps to today
$('btn-reset').addEventListener('click', () => {
  const today = new Date().toISOString().slice(0,10);
  simDays = dateToSimDays(today);
  datePick.value = today;
});

$('speed-sl').addEventListener('input', e => {
  speedExp = +e.target.value;
  const v = Math.pow(10, speedExp);
  $('speed-lbl').textContent = v>=1 ? `×${v.toFixed(0)}d/s` : `×${v.toFixed(2)}d/s`;
});

// ── ORBITAL POSITION ─────────────────────────────────────────────────────────
function keplerPos(a,e,inc_deg,L0_deg,period_days,days){
  // Mean anomaly from mean longitude
  const n=360/period_days; // deg/day
  const M=((L0_deg+n*days)%360)*Math.PI/180;
  // Solve Kepler's equation iteratively
  let E=M;
  for(let iter=0;iter<10;iter++) E=M+e*Math.sin(E);
  // True anomaly
  const f=2*Math.atan2(Math.sqrt(1+e)*Math.sin(E/2),Math.sqrt(1-e)*Math.cos(E/2));
  const r=a*(1-e*Math.cos(E));
  const inc=inc_deg*Math.PI/180;
  return new THREE.Vector3(
    r*Math.cos(f),
    r*Math.sin(f)*Math.sin(inc),
    r*Math.sin(f)*Math.cos(inc)
  );
}

// ── LABEL UPDATE ─────────────────────────────────────────────────────────────
const _ndc=new THREE.Vector3(),_off=new THREE.Vector3();
const LPXH=16, LPXOFF=8;

function updateLabelScale(sprite, wx, wy, wz){
  const H=renderer.domElement.clientHeight||innerHeight;
  const W=renderer.domElement.clientWidth||innerWidth;
  _ndc.set(wx,wy,wz).project(camera);
  const depth=_ndc.z;
  const ndcH=(LPXH/H)*2;
  _off.set(_ndc.x,_ndc.y+ndcH,depth).unproject(camera);
  const wH=_off.distanceTo(new THREE.Vector3(wx,wy,wz));
  const asp=sprite.userData.aspect||4;
  sprite.scale.set(wH*asp,wH,1);
  const ndcX=(LPXOFF/W)*2;
  _off.set(_ndc.x+ndcX,_ndc.y,depth).unproject(camera);
  sprite.position.set(_off.x+wH*asp*.5,_off.y+wH*.5,_off.z);
}

// ── PICKING ───────────────────────────────────────────────────────────────────
const ray=new THREE.Raycaster();
const mv2=new THREE.Vector2();
const pickables=[];

function rebuildPickables(){
  pickables.length=0;
  pickables.push({mesh:sunMesh,name:'Sun',isSun:true});
  planetObjects.forEach(po=>{
    pickables.push({mesh:po.mesh,name:po.data.name,data:po.data});
    po.moons.forEach(mo=>pickables.push({mesh:mo.mesh,name:mo.data.name,isMoon:true,moonData:mo.data,parentData:po.data}));
  });
}
rebuildPickables();

function pick(mx,my){
  mv2.set((mx/innerWidth)*2-1,-(my/innerHeight)*2+1);
  ray.setFromCamera(mv2,camera);
  const meshes=pickables.map(p=>p.mesh);
  const hits=ray.intersectObjects(meshes,false);
  if(!hits.length)return null;
  return pickables.find(p=>p.mesh===hits[0].object)||null;
}

const tp=$('tp');
cvs.addEventListener('mousemove',e=>{
  if(cam.drag){tp.style.display='none';return;}
  const h=pick(e.clientX,e.clientY);
  if(h){
    tp.style.display='block';tp.style.left=(e.clientX+14)+'px';tp.style.top=(e.clientY-10)+'px';
    $('tn').textContent=h.name;
    if(h.isSun) $('tb').innerHTML='Our star · G2V · Age: <b>4.6 Gyr</b>';
    else if(h.isMoon) $('tb').innerHTML=`Moon of ${h.parentData.name}<br>Orbital period: <b>${h.moonData.period.toFixed(2)}d</b>`;
    else $('tb').innerHTML=`${h.data.type}<br>Distance: <b>${h.data.a.toFixed(3)} AU</b>`;
    cvs.style.cursor='pointer';
  }else{tp.style.display='none';cvs.style.cursor='default';}
});

cvs.addEventListener('click',e=>{
  const h=pick(e.clientX,e.clientY);
  if(!h)return;
  openDetail(h);
});

const WIKI={
  'Sun':'Sun','Mercury':'Mercury','Venus':'Venus','Earth':'Earth',
  'Mars':'Mars','Jupiter':'Jupiter','Saturn':'Saturn','Uranus':'Uranus','Neptune':'Neptune',
  'Moon':'Moon','Io':'Io_(moon)','Europa':'Europa_(moon)','Ganymede':'Ganymede_(moon)',
  'Callisto':'Callisto_(moon)','Titan':'Titan_(moon)','Triton':'Triton_(moon)',
};

function openDetail(h){
  $('dp').style.display='block';
  if(h.isSun){
    $('dn').textContent='Sun';
    $('dtype').textContent='G2V Main Sequence Star';
    $('ddist').textContent='0 AU (origin)';
    $('ddiam').textContent='1,392,700 km';
    $('dmass').textContent='1.989×10³⁰ kg';
    $('dday').textContent='609.12h (equatorial)';
    $('dyear').textContent='225–250 Myr (galactic)';
    $('dmoons').textContent='8 planets, 200+ moons';
    setWiki('Sun');
  } else if(h.isMoon){
    const md=h.moonData,pd=h.parentData;
    $('dn').textContent=md.name;
    $('dtype').textContent=`Natural Satellite of ${pd.name}`;
    $('ddist').textContent=`${(md.a*pd.r/149598000).toFixed(4)} AU from ${pd.name}`;
    $('ddiam').textContent=`${(md.r*2).toLocaleString()} km`;
    $('dmass').textContent='—';
    $('dday').textContent=`${md.period.toFixed(2)}d (tidally locked)`;
    $('dyear').textContent=`${md.period.toFixed(2)}d`;
    $('dmoons').textContent='0';
    $('dr-moons').style.display='none';
    setWiki(md.name);
  } else {
    const d=h.data;
    $('dn').textContent=d.name;
    $('dtype').textContent=d.type;
    $('ddist').textContent=`${d.a.toFixed(4)} AU (semi-major)`;
    $('ddiam').textContent=`${(d.r*2).toLocaleString()} km`;
    $('dmass').textContent=d.mass+' kg';
    $('dday').textContent=d.day;
    $('dyear').textContent=d.year;
    $('dmoons').textContent=d.moons.toString();
    setWiki(d.name);
    // Show moon viewer button for planets that have moons
    if(d.moons > 0){
      $('dr-moons').style.display='';
      $('btn-moons').textContent='⬡ Moons';
      $('btn-moons').onclick=()=>{
        const base=window.location.href.replace(/\/[^\/]*$/,'/');
        const p=new URLSearchParams({
          planet:   d.name,
          parent:   'Sol',
          planet_id:0,
          r_km:     Math.round(d.r),
          color:    d.color.slice(1),
          type:     d.type,
          orbit_au: d.a.toFixed(4),
          period:   d.year,
          star_hip:    '',
          star_hd:     '',
          star_spect:  'G2V',
          star_absmag: '4.83',
          star_dist:   '0',
          star_name:   'Sol',
          surface_map: SOL_TEX_DIR + (SOL_PLANET_MAP[d.name]||''),
        });
        window.open(base+'planet-system.html?'+p.toString(),'_blank','noopener');
      };
    } else {
      $('dr-moons').style.display='none';
    }
  }
}
function setWiki(name){
  const slug=WIKI[name];
  if(slug){$('dwiki').href='https://en.wikipedia.org/wiki/'+slug;$('dr-wiki').style.display='';}
  else $('dr-wiki').style.display='none';
}
$('cs').addEventListener('click',()=>$('dp').style.display='none');

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
let last=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  const dt=(now-last)/1000; // real seconds
  last=now;

  if(playing){
    const daysPerSec=Math.pow(10,speedExp);
    simDays+=daysPerSec*dt;
  }

  cam.update();

  // Update planet positions
  planetObjects.forEach(po=>{
    const pd=po.data;
    const pos=keplerPos(pd.a,pd.e,pd.inc,pd.L0,
      pd.name==='Mercury'?87.97:pd.name==='Venus'?224.7:pd.name==='Earth'?365.25:
      pd.name==='Mars'?686.97:pd.name==='Jupiter'?4332.6:pd.name==='Saturn'?10759.2:
      pd.name==='Uranus'?30685.4:60190,simDays);
    po.mesh.position.copy(pos);

    // Planet self-rotation (visual only)
    po.mesh.rotation.y+=dt*.3;

    // Update moon positions — orbit distance uses per-planet moonScale
    // so moons are always visible outside the planet's visual sphere.
    // True AU orbit would bury them inside the planet mesh.
    po.moons.forEach(mo=>{
      const md=mo.data;
      const moonAngle=(simDays/md.period)*Math.PI*2;
      // Scaled orbit radius: preserves real ratios between moons
      const orbitR = md.a * po.moonScale;
      mo.mesh.position.set(
        pos.x + Math.cos(moonAngle)*orbitR,
        pos.y,
        pos.z + Math.sin(moonAngle)*orbitR
      );
      updateLabelScale(mo.label,mo.mesh.position.x,mo.mesh.position.y,mo.mesh.position.z);
      // Show moons and their labels when camera is within ~3 orbital radii of the parent
      const d2=(camera.position.x-pos.x)**2+(camera.position.y-pos.y)**2+(camera.position.z-pos.z)**2;
      const outerOrbit = Math.max(...po.moons.map(m=>m.data.a)) * po.moonScale;
      const visible = d2 < (outerOrbit * 4)**2;
      mo.mesh.visible   = visible;
      mo.label.visible  = visible;
    });

    updateLabelScale(po.label,pos.x,pos.y,pos.z);
  });

  // Sol label
  updateLabelScale(sunLbl,0,0,0);

  // Sun pulse
  const t=performance.now()*.001;
  sunMesh.scale.setScalar(1+.06*Math.sin(t*1.2));

  // Date display — update the picker only when user isn't interacting with it
  if(!userPickingDate) datePick.value = simDaysToDateStr(simDays);

  renderer.render(scene,camera);
}
animate();
loadSolTextures();
